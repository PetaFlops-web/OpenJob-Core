name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "24"

jobs:
  # ── API: lint + test ────────────────────────────────────
  api:
    name: "API – Lint & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install --ignore-scripts
      - run: npm run lint
      - run: npm run test

  # ── UI: lint ────────────────────────────────────────────
  ui:
    name: "UI – Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install --ignore-scripts
      - run: npm run lint

  # ── UI Docker build check ───────────────────────────────
  ui-docker:
    name: "UI – Docker Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build ./ui