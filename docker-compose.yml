services:
  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: openjob-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: openjob_db
      POSTGRES_USER: openjob
      POSTGRES_PASSWORD: openjob
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openjob -d openjob_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: openjob-redis
    restart: unless-stopped
    command: redis-server --requirepass openjob_redis_secret --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "openjob_redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ ───────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: openjob-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── ATS Machine Learning ───────────────────────────────
  ats-ml:
    build:
      context: ./ats
      dockerfile: Dockerfile
    container_name: openjob-ats-ml
    restart: unless-stopped
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; resp = urllib.request.urlopen('http://127.0.0.1:5000/api/v1/ats/health'); assert resp.status == 200\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ── API ────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: openjob-api
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      HOST: "0.0.0.0"
      PORT: "3000"
      # PostgreSQL
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: openjob_db
      PGUSER: openjob
      PGPASSWORD: openjob
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: openjob_db
      POSTGRES_USER: openjob
      POSTGRES_PASSWORD: openjob
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: openjob_redis_secret
      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: "/"
      # JWT
      ACCESS_TOKEN_KEY: ${ACCESS_TOKEN_KEY:-change_me_access_token_secret_min_32_chars}
      REFRESH_TOKEN_KEY: ${REFRESH_TOKEN_KEY:-change_me_refresh_token_secret_min_32_chars}
      # SMTP
      SMTP_HOST: ${SMTP_HOST:-smtp.mailtrap.io}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@openjob.dev}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CORS_ALLOW_CREDENTIALS: "true"
      # Rate limits
      RATE_LIMIT_WINDOW_MS: "900000"
      RATE_LIMIT_MAX_REQUESTS: "10000"
      API_RATE_LIMIT_MAX_REQUESTS: "5000"
      AUTH_RATE_LIMIT_MAX_REQUESTS: "100"
      # ATS
      ATS_ML_API_URL: http://ats-ml:5000
      ATS_ML_API_KEY: ${ATS_ML_API_KEY:-}
      # Migrations
      RUN_MIGRATIONS: "auto"
      # Firebase
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
    volumes:
      - api_documents:/app/src/documents/pdf
      - api_uploads:/app/src/profile/uploads
      - api_companies:/app/src/companies/uploads
      - api_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── UI ──────────────────────────────────────────────────
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
        BACKEND_URL: http://api:3000
    container_name: openjob-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      BACKEND_URL: http://api:3000
    depends_on:
      api:
        condition: service_healthy

  # ── Consumer ────────────────────────────────────────────
  consumer:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    container_name: openjob-consumer
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # PostgreSQL
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: openjob_db
      PGUSER: openjob
      PGPASSWORD: openjob
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: openjob_db
      POSTGRES_USER: openjob
      POSTGRES_PASSWORD: openjob
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: openjob_redis_secret
      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: "/"
      # SMTP
      SMTP_HOST: ${SMTP_HOST:-smtp.mailtrap.io}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  api_documents:
  api_uploads:
  api_companies:
  api_logs:
